name: CI Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Cache npm dependencies (speed up install)
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Setup Node (current LTS)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - run: npm ci

      # Lint the code (ESLint) – fails on any warning
      - name: Lint
        run: npx eslint "src/**/*.ts*" --max-warnings=0
        continue-on-error: true

      # TypeScript type‑check (no emit)
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      # Run unit tests with coverage (Vitest)
      - name: Test
        run: npx vitest run --coverage
      # Upload Vitest coverage report
      - name: Upload vitest coverage
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/

      # npm audit for known vulnerable packages (fail on high severity)
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true


      # Start a preview server on port 5173
      - name: Start preview server
        run: npm run preview -- --port 5173 &
      # Wait for preview server to be ready
      - name: Wait for preview server
        run: npx wait-on http://localhost:5173
      # Run UI tests with Playwright
      - name: Run UI tests
        run: npx playwright test
      # Upload Playwright report
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/






      # NVIDIA NIM inference (Minimax‑M2.7)
      - name: Run NVIDIA NIM model
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          RESPONSE=$(curl -sS -X POST https://integrate.api.nvidia.com/v1/chat/completions \
            -H "Authorization: Bearer $NVIDIA_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "nvidia_nim/minimaxai/minimax-m2.7",
              "messages": [
                {"role":"system","content":"You are an expert code reviewer for a React/TypeScript Overwolf app."},
                {"role":"user","content":"Summarize any potential issues in the source code after the latest commit."}
              ],
              "temperature": 0.0
              }')
          echo "$RESPONSE"
          echo "$RESPONSE" > nim_report.json

      # Upload NIM report artifact
      - uses: actions/upload-artifact@v4
        with:
          name: nim-report
          path: nim_report.json








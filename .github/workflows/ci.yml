name: CI Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node (current LTS)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - run: npm ci

      # Build the app (Vite)
      - run: npm run build

      # Start a preview server in background (Vite preview serves static files)
      - name: Start preview server
        run: |
          npm run preview &
          # Wait for server to be ready (default Vite preview port 4173)
          for i in {1..30}; do
            curl -sSf http://localhost:4173 && break || sleep 1
done
        shell: bash

      # Security scan (Ruflo)
      - name: Security scan
        run: |
          npx @claude-flow/cli@latest security scan --depth quick
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      # Browser UI tests (Playwright via Ruflo browser-test skill)
      - name: Browser UI test
        run: |
          npx @claude-flow/cli@latest browser-test http://localhost:4173 --screenshot
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      # Code review swarm (Ruflo)
      - name: Code review swarm
        run: |
          # Initialise and run the code‑review‑swarm agent on the current PR
          npx @claude-flow/cli@latest swarm init --v3-mode
          npx @claude-flow/cli@latest swarm run --agents "security,performance,style,architecture,accessibility" --pr ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      # Performance metrics
      - name: Performance metrics
        run: |
          npx @claude-flow/cli@latest performance metrics
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      # Upload artifacts (optional) for review
      - uses: actions/upload-artifact@v4
        with:
          name: ruflo-reports
          path: ./

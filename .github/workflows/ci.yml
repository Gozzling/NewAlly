name: CI Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Cache npm dependencies (speed up install)
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Setup Node (current LTS)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - run: npm ci

      # Lint the code (ESLint) – fails on any warning
      - name: Lint
        run: npx eslint "src/**/*.ts*" --max-warnings=0

      # TypeScript type‑check (no emit)
      - name: Type check
        run: npx tsc --noEmit

      # Run unit tests with coverage (Vitest)
      - name: Test
        run: npx vitest run --coverage

      # npm audit for known vulnerable packages (fail on high severity)
      - name: npm audit
        run: npm audit --audit-level=high

      # Build the app (Vite)
      - run: npm run build

      # Start a preview server in background (Vite preview serves static files)
        # preview server step removed



      # NVIDIA NIM inference (Minimax‑M2.7)
        - name: Run NVIDIA NIM model
          env:
            NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          run: |
            RESPONSE=$(curl -sS -X POST https://integrate.api.nvidia.com/v1/chat/completions \
              -H "Authorization: Bearer $NVIDIA_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "model": "nvidia_nim/minimaxai/minimax-m2.7",
                "messages": [
                  {"role":"system","content":"You are an expert code reviewer for a React/TypeScript Overwolf app."},
                  {"role":"user","content":"Summarize any potential issues in the source code after the latest commit."}
                ],
                "temperature": 0.0
                }')
            echo "$RESPONSE"
            echo "$RESPONSE" > nim_report.json

      # Upload NIM report artifact
      - uses: actions/upload-artifact@v4
        with:
          name: nim-report
          path: nim_report.json







